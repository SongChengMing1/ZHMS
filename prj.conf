# =============================================================================
# ZHMS (Zephyr Health Monitoring System) — Project Configuration
# =============================================================================
# 日志配置
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_THREAD_NAME=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_EVENTS=y

# Tracealyzer / TraceRecorder
# CONFIG_TRACING is not set
# CONFIG_PERCEPIO_TRACERECORDER is not set
# CONFIG_PERCEPIO_TRC_START_MODE_START is not set
# CONFIG_PERCEPIO_TRC_CFG_STREAM_PORT_RINGBUFFER is not set
# CONFIG_PERCEPIO_TRC_CFG_STREAM_PORT_RINGBUFFER_SIZE=65536
# CONFIG_PERCEPIO_TRC_CFG_CTRL_TASK_STACK_SIZE=1024
# CONFIG_TRACING_SYSCALL is not set

# 栈空间
CONFIG_MAIN_STACK_SIZE=4096

# flash配置
CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y

# =============================================================================
# WiFi & Networking
# =============================================================================
CONFIG_WIFI=y
CONFIG_NETWORKING=y
CONFIG_MQTT_LIB=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DHCPV4=y
CONFIG_DNS_RESOLVER=y
CONFIG_SNTP=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_MQTT_KEEPALIVE=30

# Network debug
CONFIG_NET_LOG=y

# =============================================================================
# LCD Display (ST7789V) + LVGL Configuration
# =============================================================================

# Display driver framework
CONFIG_DISPLAY=y

# Regulator (backlight control via GPIO)
CONFIG_REGULATOR=y

# ST7789V display driver
CONFIG_ST7789V=y

# RGB565 字节序交换（部分模块需启用）
# CONFIG_ST7789V_RGB565X=y

# LVGL graphics library
CONFIG_LVGL=y
CONFIG_LV_Z_LVGL_MUTEX=y
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_36=y
CONFIG_LV_FONT_MONTSERRAT_48=y
CONFIG_LV_FONT_SOURCE_HAN_SANS_SC_14_CJK=y
CONFIG_LV_FONT_SOURCE_HAN_SANS_SC_16_CJK=y

# LVGL widgets used
CONFIG_LV_USE_LABEL=y
CONFIG_LV_LABEL_TEXT_SELECTION=y
CONFIG_LV_LABEL_LONG_TXT_HINT=y
CONFIG_LV_USE_LINE=y

# =============================================================================
# Touch (CST816D) — I2C + Input + LVGL Pointer
# =============================================================================
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_INPUT_CST8XX=y
CONFIG_LV_Z_POINTER_INPUT=y
# MAX30102 sensor bring-up
CONFIG_SENSOR=y
CONFIG_MAX30102=y
